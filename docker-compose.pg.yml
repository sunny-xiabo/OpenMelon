# Deprecated compatibility file.
# PostgreSQL is now part of the main docker-compose.yml runtime; prefer `docker compose up -d postgres`.

services:
  postgres:
    image: postgres:16
    container_name: openmlon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openmelon}
      POSTGRES_USER: ${POSTGRES_USER:-openmelon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmelon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmelon} -d ${POSTGRES_DB:-openmelon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openmlon-network

volumes:
  postgres_data:
