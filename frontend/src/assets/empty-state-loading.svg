<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="pedestal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g transform="translate(0, 40)">
    <ellipse cx="200" cy="300" rx="140" ry="45" fill="url(#pedestal)" />
    <path d="M 60 300 C 60 325, 122 345, 200 345 C 278 345, 340 325, 340 300 C 340 308, 278 355, 200 355 C 122 355, 60 308, 60 300 Z" fill="#CBD5E1" opacity="0.3" />
    <ellipse cx="200" cy="300" rx="90" ry="25" fill="none" stroke="#C084FC" stroke-width="2" stroke-dasharray="15 10" opacity="0.6" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 200 300" to="360 200 300" dur="4s" repeatCount="indefinite" />
    </ellipse>
  </g>
  <g transform="translate(200, 180)">
    <circle cx="0" cy="0" r="55" fill="url(#brain)" opacity="0.9" filter="url(#glow)" />
    <path d="M -30 -20 Q 0 -40 30 -20 T 30 20 Q 0 40 -30 20 T -30 -20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5" />
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" opacity="0.3" />
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" filter="url(#glow)" />
    <circle cx="-40" cy="0" r="4" fill="#FFFFFF" opacity="0.8" />
    <circle cx="40" cy="0" r="4" fill="#FFFFFF" opacity="0.8" />
  </g>
  <circle cx="120" cy="120" r="6" fill="#C084FC" filter="url(#glow)" />
  <circle cx="280" cy="130" r="8" fill="#9333EA" filter="url(#glow)" />
  <circle cx="150" cy="250" r="5" fill="#E879F9" />
  <path d="M 200 180 L 120 120 M 200 180 L 280 130 M 200 180 L 150 250" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4" />
</svg>
