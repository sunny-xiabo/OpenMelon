<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear" x1="120" y1="40" x2="120" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <filter id="filter0_f" x="80" y="80" width="80" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="12" result="effect1_foregroundBlur"/>
    </filter>
  </defs>
  
  <!-- Connections -->
  <path d="M120 120L180 80" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite" />
  </path>
  <path d="M120 120L60 80" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite" />
  </path>
  <path d="M120 120L120 180" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Glowing background -->
  <circle cx="120" cy="120" r="40" fill="#10B981" fill-opacity="0.15" filter="url(#filter0_f)">
    <animate attributeName="r" values="30;45;30" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Central Core -->
  <path d="M120 100L137.321 110V130L120 140L102.679 130V110L120 100Z" fill="url(#paint0_linear)" stroke="#fff" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 120 120" to="360 120 120" dur="10s" repeatCount="indefinite" />
  </path>
  
  <!-- Outer Nodes -->
  <circle cx="180" cy="80" r="8" fill="#10B981" stroke="#fff" stroke-width="2" />
  <circle cx="60" cy="80" r="8" fill="#10B981" stroke="#fff" stroke-width="2" />
  <circle cx="120" cy="180" r="8" fill="#10B981" stroke="#fff" stroke-width="2" />

  <!-- Checks -->
  <path d="M115 120L118 123L125 117" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
</svg>
