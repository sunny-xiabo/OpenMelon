<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="pedestal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="error" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g transform="translate(0, 40)">
    <ellipse cx="200" cy="300" rx="140" ry="45" fill="url(#pedestal)" />
    <path d="M 60 300 C 60 325, 122 345, 200 345 C 278 345, 340 325, 340 300 C 340 308, 278 355, 200 355 C 122 355, 60 308, 60 300 Z" fill="#CBD5E1" opacity="0.3" />
    <ellipse cx="200" cy="300" rx="110" ry="32" fill="none" stroke="#FB7185" stroke-width="1.5" stroke-dasharray="10 10" opacity="0.5" />
  </g>
  <g transform="translate(200, 180)">
    <polygon points="0,-70 70,50 -70,50" fill="url(#error)" opacity="0.85" filter="url(#glow)" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" />
    <rect x="-4" y="-20" width="8" height="35" rx="4" fill="#FFFFFF" />
    <circle cx="0" cy="30" r="5" fill="#FFFFFF" />
  </g>
  <polygon points="120,100 130,80 140,110" fill="#FB7185" filter="url(#glow)" opacity="0.7" transform="rotate(-20 130 95)" />
  <polygon points="280,240 295,220 310,250" fill="#E11D48" filter="url(#glow)" opacity="0.6" transform="rotate(45 295 235)" />
  <circle cx="200" cy="180" r="100" fill="none" stroke="#FB7185" stroke-width="1" opacity="0.3" stroke-dasharray="4 8" />
</svg>
