name: openmlon
version: "3.8"
services:
  neo4j:
    image: neo4j:5.15.0
    container_name: openmlon-neo4j
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*,gds.*'
      NEO4J_dbms_security_procedures_allowlist: 'apoc.*,gds.*'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - openmlon-network

  app:
    profiles: ["full"]  # 仅在 --profile full 时启动（生产部署用）
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: openmlon-app
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687   # 容器内使用服务名作为主机名
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      PYTHONUNBUFFERED: "1"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      API_KEY: ${API_KEY}
      API_BASE_URL: ${API_BASE_URL:-}
      CHAT_MODEL: ${CHAT_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-0}
      USE_EXTERNAL_VECTOR: ${USE_EXTERNAL_VECTOR:-false}
      QDRANT_HOST: qdrant            # 容器内固定使用服务名，覆盖 .env 中的 localhost
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      NO_PROXY: localhost,127.0.0.1,qdrant,neo4j
      no_proxy: localhost,127.0.0.1,qdrant,neo4j
      UV_SYSTEM_PYTHON: 1
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - openmlon-network

  web:
    profiles: ["full"]  # 同样仅在 full profile 下启动
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: openmlon-web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/openmelon-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - openmlon-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: openmlon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - openmlon-network

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:

networks:
  openmlon-network:
    driver: bridge
