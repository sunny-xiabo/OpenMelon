stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  NODE_VERSION: "20"

# ─── Cache ───────────────────────────────────────────────────────
.cache-uv: &cache-uv
  cache:
    key: uv-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/uv

.cache-npm: &cache-npm
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# ─── Stage 1: Lint ───────────────────────────────────────────────
lint-frontend:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  <<: *cache-npm
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npx eslint src/ --max-warnings 0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"

lint-backend:
  stage: lint
  image: ghcr.io/astral-sh/uv:latest
  <<: *cache-uv
  script:
    - cd backend
    - uvx ruff check app/ --output-format=github
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"

# ─── Stage 2: Test ───────────────────────────────────────────────
test-backend:
  stage: test
  image: ghcr.io/astral-sh/uv:latest
  needs: [lint-backend]
  <<: *cache-uv
  script:
    - cd backend
    - uv sync --frozen --no-cache
    - uv run pytest tests/ -x -q --tb=short
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"

build-check-frontend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs: [lint-frontend]
  <<: *cache-npm
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npx vite build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"

# ─── Stage 3: Build Docker images ───────────────────────────────
.build-template: &build-template
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"

build-backend-image:
  <<: *build-template
  needs: [test-backend, build-check-frontend]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" \
        -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG" \
        -f backend/docker/Dockerfile \
        backend/
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"
    - if: $CI_COMMIT_TAG =~ /^v/

build-frontend-image:
  <<: *build-template
  needs: [test-backend, build-check-frontend]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" \
        -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG" \
        -f frontend/docker/Dockerfile \
        frontend/
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "devxia"
    - if: $CI_COMMIT_TAG =~ /^v/
